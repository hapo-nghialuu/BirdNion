name: linux-release

# Publishes Linux bundles (.deb/.rpm/AppImage) to the GitHub Release.
# Temporarily manual-only: automatic tag-triggered Linux release builds are
# disabled until the Linux packaging lane is re-enabled.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to attach bundles to (e.g. v0.8.6)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: linux
    env:
      # Manual dispatch uses the `tag` input and builds from the dispatched
      # ref. Keep the tag-push branch in the expression so re-enabling
      # automatic tag builds later is only a trigger change.
      RELEASE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches tauri.conf.json version
        run: |
          TAG_VERSION="${RELEASE_TAG#v}"
          CONF_VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          if [ "$TAG_VERSION" != "$CONF_VERSION" ]; then
            echo "Tag v$TAG_VERSION does not match tauri.conf.json version $CONF_VERSION" >&2
            exit 1
          fi

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: linux/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: linux/src-tauri

      - name: Install npm dependencies
        run: npm ci

      - name: Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Download bundled CLIProxyAPI helper
        shell: bash
        run: |
          set -euo pipefail
          helper_name="cliproxyapi-linux-x86_64"
          asset_base="https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}"
          mkdir -p src-tauri/binaries
          curl --fail --location --retry 3 --retry-delay 2 \
            "${asset_base}/${helper_name}" \
            -o "src-tauri/binaries/${helper_name}"
          curl --fail --location --retry 3 --retry-delay 2 \
            "${asset_base}/${helper_name}.sha256" \
            -o "src-tauri/binaries/${helper_name}.sha256"
          (
            cd src-tauri/binaries
            sha256sum -c "${helper_name}.sha256"
            mv "${helper_name}" cliproxyapi
          )
          chmod 755 src-tauri/binaries/cliproxyapi
          file src-tauri/binaries/cliproxyapi

      - name: Build bundles (.deb / .rpm / AppImage)
        env:
          HAPO_BASE_URL: ${{ secrets.HAPO_BASE_URL }}
          HAPO_ME_URL: ${{ secrets.HAPO_ME_URL }}
          HAPO_AUTH_TEMPLATE: ${{ secrets.HAPO_AUTH_TEMPLATE }}
        shell: bash
        run: |
          for name in HAPO_BASE_URL HAPO_ME_URL HAPO_AUTH_TEMPLATE; do
            if [ -z "${!name}" ]; then
              echo "Required GitHub Actions secret $name is missing" >&2
              exit 1
            fi
          done
          if [[ "$HAPO_AUTH_TEMPLATE" != *'{token}'* ]]; then
            echo "HAPO_AUTH_TEMPLATE must contain the literal {token} placeholder" >&2
            exit 1
          fi

          cargo clean --manifest-path src-tauri/Cargo.toml -p birdnion --release
          npm run tauri build

          binary=src-tauri/target/release/birdnion
          for name in HAPO_BASE_URL HAPO_ME_URL HAPO_AUTH_TEMPLATE; do
            if ! grep -aFq -- "${!name}" "$binary"; then
              echo "$name was not baked into the release binary" >&2
              exit 1
            fi
          done

      - name: Upload bundles to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            linux/src-tauri/target/release/bundle/deb/*.deb
            linux/src-tauri/target/release/bundle/rpm/*.rpm
            linux/src-tauri/target/release/bundle/appimage/*.AppImage
          fail_on_unmatched_files: true
